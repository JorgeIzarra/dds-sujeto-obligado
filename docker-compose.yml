services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dds_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dds_db}
    ports:
      - "5433:5432" # 5433 en el host para evitar conflicto con PostgreSQL 17 nativo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dds} -d ${POSTGRES_DB:-dds_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dds}:${POSTGRES_PASSWORD:-dds_dev_password}@postgres:5432/${POSTGRES_DB:-dds_db}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
