sonar.organization=jorgeizarra
sonar.projectKey=JorgeIzarra_dds-sujeto-obligado

sonar.projectName=DDS Sujeto Obligado
sonar.projectVersion=0.1.0

# ── Fuentes ───────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests
sonar.language=ts

# ── Exclusiones ───────────────────────────────────────────────────────────────
sonar.exclusions=dist/**,coverage/**,node_modules/**,prisma/**

# ── Cobertura (lcov generado por Vitest con `npm run test:coverage`) ──────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
