name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Test & Coverage ──────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    # PostgreSQL disponible desde Sesión 1 para que la Sesión 2 no requiera
    # reconfigurar el pipeline cuando lleguen las pruebas de integración.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dds
          POSTGRES_PASSWORD: dds_test_password
          POSTGRES_DB: dds_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dds -d dds_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dds:dds_test_password@localhost:5432/dds_test
      NODE_ENV: test
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 3: SonarCloud Analysis ──────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    # Requiere el secret SONAR_TOKEN en:
    # GitHub → Settings → Secrets and variables → Actions → SONAR_TOKEN
    # Y "Automatic Analysis" deshabilitado en SonarCloud → Administration → Analysis Method.

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 0 necesario para que SonarCloud analice el historial
          # completo y compute correctamente las métricas de nuevo código.
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
